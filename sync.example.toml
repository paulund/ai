# sync.toml — command & skill distribution config
# Copy this to sync.toml and edit for your machine.
# sync.toml is gitignored — your local paths stay local.

[global]
# Directories where commands are copied as files
command_targets = ["~/.config/opencode/agents/"]

# Directories where skills are copied as directories
# ~/.config/opencode/skills/ is opencode's primary scan path
# ~/.agents/skills/ is auto-loaded by opencode as external skills
skill_targets  = ["~/.config/opencode/skills/", "~/.agents/skills/"]

# Commands to install globally (names match commands/<name>.md)
commands = [
    "dev-implement",
    "dev-merge-main",
    "learn",
    "learn-prs",
    "ops-triage",
    "plan-bug",
    "plan-grill-me",
    "plan-to-prd",
    "pr-fix",
    "pr-review",
    "pr-verify",
    "github-release",

]

# Skills to install globally (names match skills/<name>/)
skills = [
    "dev-simplify",
    "ops-architecture-review",
    "quality-gate",
    "standards-api",
    "standards-laravel",
    "standards-nextjs",
    "standards-php",
    "standards-typescript",
    "writing-humanizer",
]

# Per-project installs
# Commands go to <project>/.agents/commands/
# Skills go to <project>/.agents/skills/
# [[project]]
# path    = "~/Documents/Code/my-app"
# commands = ["dev-implement"]
# skills  = ["standards-laravel", "standards-php"]
