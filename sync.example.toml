# sync.toml — command, skill & agent distribution config
# Copy this to sync.toml and edit for your machine.
# sync.toml is gitignored — your local paths stay local.

[global]
# Directories where commands are symlinked as files
command_targets = ["~/.config/opencode/commands/"]

# Directories where skills are symlinked as directories
# ~/.config/opencode/skills/ is opencode's primary scan path
# ~/.agents/skills/ is auto-loaded by opencode as external skills
skill_targets = ["~/.config/opencode/skills/", "~/.agents/skills/"]

# Directories where agents are symlinked as files
agent_targets = ["~/.config/opencode/agents/"]

# Commands to install globally (names match commands/<name>.md)
commands = [
    "build",
    "github-release",
    "learn",
    "plan",
    "resolve-conflicts",
    "review",
    "ship",
    "simplify",
    "spec",
    "test",
    "triage",
    "verify",
]

# Skills to install globally (names match skills/<name>/)
# General-purpose skills needed across all projects.
# standards-* skills are project-specific — install them per-project below.
skills = [
    "architecture-review",
    "code-review-and-quality",
    "code-simplification",
    "context-engineering",
    "debugging-and-error-recovery",
    "deprecation-and-migration",
    "doubt-driven-development",
    "documentation-and-adrs",
    "frontend-ui-engineering",
    "git-workflow-and-versioning",
    "incremental-implementation",
    "interview-me",
    "learn-from-session",
    "observability-and-instrumentation",
    "performance-optimization",
    "planning-and-task-breakdown",
    "quality-gate",
    "security-and-hardening",
    "shipping-and-launch",
    "source-driven-development",
    "spec-driven-development",
    "test-driven-development",
    "writing-humanizer",
]

# Agents to install globally (names match agents/<name>.md)
agents = [
    "code-reviewer",
    "security-auditor",
    "test-engineer",
]

# Per-project installs
# Commands go to <project>/.opencode/commands/
# Skills go to <project>/.agents/skills/
# Agents go to <project>/.opencode/agents/

